<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="main.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1 id="title">Stop Watch</h1>
    <div class="stopWatch-container">
        <div class="display">
            <h1 class="stopwatch" id="stop-watch">00:00:00:00</h1>
        </div>
        <div class="action-btn">
            <button class="start-btn" onclick="startTime()">START</button>
            <button class="stop-btn" onclick="stopTime()">STOP</button>
            <button class="reset-btn" onclick="resetTime()">RESET</button>
        </div>
    </div>
</body>

<script src="stop-watch-code.js"></script>
</html>
